<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>Art.id - YudaTmpnIsWebsite</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600&family=Gaegu&family=Gloria+Hallelujah&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #f7efe2;
            background-image: radial-gradient(circle at 20% 35%, rgba(150, 110, 70, 0.08) 2%, transparent 2.5%);
            background-size: 26px 26px;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 1.2rem;
        }

        /* Container utama */
        .sketch-id {
            max-width: 720px;
            width: 100%;
            margin: 0 auto;
            background: #fffdf9;
            border-radius: 48px;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.12), inset 0 1px 0 rgba(255, 250, 225, 0.8);
            padding: 1.5rem;
            position: relative;
            border: 1px solid #e4d2bc;
        }

        /* efek coretan pinggir */
        .sketch-id::before {
            content: "✍️";
            font-size: 1.6rem;
            position: absolute;
            bottom: 12px;
            right: 18px;
            opacity: 0.25;
            transform: rotate(-6deg);
            pointer-events: none;
        }

        .sketch-id::after {
            content: "";
            position: absolute;
            top: 18px;
            left: 18px;
            width: 70px;
            height: 50px;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 50"><path fill="none" stroke="%23d4bb97" stroke-width="1.2" stroke-linecap="round" stroke-dasharray="2 3" d="M10,12 L45,10 M6,24 L50,21 M15,38 L65,34"/></svg>');
            opacity: 0.45;
            pointer-events: none;
        }

        /* Kartu ID */
        .id-card {
            background: rgba(255, 252, 245, 0.96);
            border-radius: 36px;
            padding: 1.4rem;
            border: 2px solid #31261e;
            box-shadow: 7px 7px 0 #dac09f;
            position: relative;
        }

        /* SEMUA SECTION DI TENGAH */
        .profile-layout {
            display: flex;
            flex-wrap: wrap;
            gap: 1.2rem;
            align-items: center;
            justify-content: center;  /* pusatkan grup avatar & info */
        }

        /* Avatar */
        .avatar-zone {
            flex: 0 0 135px;
            text-align: center;
            cursor: pointer;
        }

        .avatar-drawing {
            width: 135px;
            height: 135px;
            background: #fef2e4;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 3px solid #b77b51;
            box-shadow: 0 0 0 4px #f8e8da;
            margin: 0 auto;
            transition: transform 0.2s ease;
            overflow: hidden;
        }

        .avatar-drawing:hover {
            transform: scale(1.02);
        }

        .default-svg {
            width: 115px;
            height: 115px;
        }

        .user-avatar-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .avatar-drawing.has-image .default-svg {
            display: none;
        }
        .avatar-drawing.has-image .user-avatar-img {
            display: block;
        }

        .caption-sketch {
            font-family: 'Gaegu', cursive;
            font-size: 0.7rem;
            margin-top: 8px;
            background: #f1e3d4;
            display: inline-block;
            padding: 3px 12px;
            border-radius: 60px;
            color: #8b6748;
        }

        .upload-hint {
            font-size: 0.6rem;
            font-family: monospace;
            color: #b57244;
            margin-top: 4px;
            opacity: 0.7;
        }

        /* Info identitas - text center */
        .identity-info {
            flex: 1;
            min-width: 180px;
            text-align: center;
        }

        .nama-cowok {
            font-family: 'Gloria Hallelujah', cursive;
            font-size: 2rem;
            letter-spacing: 0.5px;
            color: #2c241e;
            border-bottom: 3px dotted #e6b17e;
            display: inline-block;
            margin-bottom: 0.4rem;
            padding-bottom: 0.2rem;
        }

        .badge-role {
            font-family: 'Gaegu', monospace;
            font-size: 0.85rem;
            background: #e7d5bf;
            padding: 0.25rem 1rem;
            border-radius: 50px;
            display: inline-flex;
            align-items: center;
            gap: 7px;
            margin: 0.5rem auto;
            color: #4a3523;
        }

        .detail-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 0.6rem;
            margin-top: 0.8rem;
            justify-content: center;
        }

        .detail-chip {
            background: #f2e6d9;
            padding: 0.3rem 0.9rem;
            border-radius: 40px;
            font-size: 0.75rem;
            font-family: monospace;
            border: 1px solid #dcc8ac;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        /* Tanda tangan - sekarang center */
        .signature-area {
            margin-top: 1.4rem;
            border-top: 1.5px dashed #dec7a8;
            padding-top: 0.8rem;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .hand-sign {
            font-family: 'Gaegu', cursive;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .stempel {
            background: #eedbc8;
            padding: 3px 10px;
            border-radius: 60px;
            font-size: 0.65rem;
            font-family: monospace;
            color: #8b5a37;
        }

        /* Sosial media */
        .social-doodle-mini {
            margin-top: 1.5rem;
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .social-icon-hand {
            background: #efe2d2;
            border-radius: 50%;
            width: 46px;
            height: 46px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            color: #6c4f33;
            transition: all 0.2s;
            border: 1.5px solid #b58962;
            cursor: pointer;
        }

        .social-icon-hand:active {
            transform: scale(0.94);
            background: #dbbb98;
        }

        .footer-doodle {
            text-align: center;
            margin-top: 1.4rem;
            font-family: 'Gaegu', cursive;
            font-size: 0.65rem;
            border-top: 1px dashed #e1cab0;
            padding-top: 0.8rem;
            color: #9a7757;
        }

        #avatarUpload {
            display: none;
        }

        /* Modal tetap rapi di tengah */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0.2s, opacity 0.2s ease;
        }
        .modal-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .modal-container {
            background: #fffef7;
            max-width: 400px;
            width: 85%;
            border-radius: 48px;
            box-shadow: 0 30px 40px -20px rgba(0,0,0,0.4);
            border: 1px solid #e2cfb2;
            transform: scale(0.95);
            transition: transform 0.2s cubic-bezier(0.34, 1.2, 0.64, 1);
            overflow: hidden;
        }
        .modal-overlay.active .modal-container {
            transform: scale(1);
        }
        .modal-header {
            background: #f5ede2;
            padding: 1.2rem 1.5rem;
            border-bottom: 2px dashed #dcbe98;
            text-align: center;
        }
        .modal-header h3 {
            font-family: 'Gaegu', cursive;
            font-size: 1.8rem;
            color: #4a2e1e;
        }
        .modal-body {
            padding: 1.8rem 1.5rem;
        }
        .input-group {
            margin-bottom: 1.5rem;
        }
        .input-group label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #b27a48;
            margin-bottom: 8px;
        }
        .input-group input {
            width: 100%;
            background: #fff9f0;
            border: 1.5px solid #e2cfb2;
            border-radius: 60px;
            padding: 12px 18px;
            font-family: 'Inter', monospace;
            font-size: 1rem;
            outline: none;
        }
        .modal-actions {
            display: flex;
            gap: 12px;
            justify-content: flex-end;
            margin-top: 1.5rem;
        }
        .btn-cancel, .btn-save, .btn-submit {
            padding: 10px 22px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.8rem;
            border: none;
            cursor: pointer;
            transition: 0.2s;
        }
        .btn-cancel {
            background: #e6dbcf;
            color: #7c6044;
        }
        .btn-save, .btn-submit {
            background: #c29a6b;
            color: white;
        }
        .avatar-preview-mini {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #f6efe6;
            padding: 8px 12px;
            border-radius: 100px;
            margin-bottom: 1rem;
        }
        .mini-circle {
            width: 48px;
            height: 48px;
            background: #f2e1cf;
            border-radius: 50%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 2px solid #b77b51;
        }
        .btn-upload {
            background: #e9dacb;
            border: none;
            border-radius: 40px;
            padding: 8px 16px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            font-size: 0.8rem;
            color: #6b4c2f;
            cursor: pointer;
        }
        .error-msg {
            color: #c45a3a;
            font-size: 0.7rem;
            text-align: center;
            margin-top: 8px;
        }
        .doodle-dot {
            position: absolute;
            background: #ddc3a4;
            border-radius: 50%;
            z-index: 0;
        }
        @media (max-width: 560px) {
            .sketch-id { padding: 1rem; }
            .id-card { padding: 1rem; }
            .profile-layout { flex-direction: column; }
            .identity-info { text-align: center; }
            .nama-cowok { font-size: 1.6rem; }
            .avatar-zone { flex: 0 0 120px; }
            .avatar-drawing { width: 120px; height: 120px; }
        }
        .toast-message {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: #2c241ee6;
            backdrop-filter: blur(8px);
            color: #fff2e2;
            padding: 8px 20px;
            border-radius: 60px;
            font-family: monospace;
            font-size: 0.8rem;
            z-index: 2100;
            opacity: 0;
            transition: opacity 0.2s ease, transform 0.2s ease;
            pointer-events: none;
            white-space: nowrap;
        }
        .toast-message.show { opacity: 1; transform: translateX(-50%) translateY(0); }
    </style>
</head>

<script>
    // Audio & helper function
    let audioCtx = null;
    function initAudio() { if (!audioCtx) try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {} return audioCtx; }
    function playClick() { const ctx = initAudio(); if(!ctx) return; const play=()=>{ const o=ctx.createOscillator(), g=ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.type='sine'; o.frequency.value=880; g.gain.value=0.12; g.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime+0.2); o.start(); o.stop(ctx.currentTime+0.18); }; if(ctx.state==='suspended') ctx.resume().then(play); else play(); }
    function playSoft() { const ctx=initAudio(); if(!ctx) return; const f=()=>{ const o=ctx.createOscillator(), g=ctx.createGain(); o.connect(g); g.connect(ctx.destination); o.type='triangle'; o.frequency.value=620; g.gain.value=0.1; g.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime+0.12); o.start(); o.stop(ctx.currentTime+0.1); }; if(ctx.state==='suspended') ctx.resume().then(f); else f(); }
    function playSuccess() { const ctx=initAudio(); if(!ctx) return; const f=()=>{ const o1=ctx.createOscillator(), o2=ctx.createOscillator(), g=ctx.createGain(); o1.connect(g); o2.connect(g); g.connect(ctx.destination); o1.type='sine'; o2.type='sine'; o1.frequency.value=523.25; o2.frequency.value=659.25; g.gain.value=0.12; g.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime+0.3); o1.start(); o2.start(); o1.stop(ctx.currentTime+0.25); o2.stop(ctx.currentTime+0.25); }; if(ctx.state==='suspended') ctx.resume().then(f); else f(); }
    function showMessage(text, dur=1800) { let t=document.querySelector('.toast-message'); if(t) t.remove(); t=document.createElement('div'); t.className='toast-message'; t.innerText=text; document.body.appendChild(t); setTimeout(()=>t.classList.add('show'),10); setTimeout(()=>{ t.classList.remove('show'); setTimeout(()=>t.remove(),300); }, dur); }

    // DOM elements
    const avatarZone = document.getElementById('avatarZone');

    const avatarContainer = document.getElementById('avatarContainer');
    const userAvatarImg = document.getElementById('userAvatarImg');

    const miniPreviewDiv = document.getElementById('miniAvatarPreview');
    
    const CORRECT_PASSWORD = "Hchejsfiei34328";
    let tempSelectedFile = null;
    let currentAvatarDataUrl = null;
    
    // 🔥 HAPUS NAMA LAMA "Ardan Pratama" JIKA MASIH TERSIMPAN
    if (localStorage.getItem('userName') === "Ardan Pratama") {
        localStorage.removeItem('userName');
    }
    
    function updateNamaDanTtd(nama) {
        let bersih = nama.trim();
        if(bersih === "") bersih = "YudaSense";
        // Pastikan tidak ada yang lolos menjadi Ardan Pratama
        if (bersih === "Ardan Pratama") bersih = "YudaSense";
        namaUserSpan.innerText = bersih;
        let first = bersih.split(' ')[0].toLowerCase();
        let last = bersih.split(' ').slice(1).join('').toLowerCase() || "sense";
        let sign = `_${first}.${last}`;
        if(sign.length > 28) sign = sign.substring(0,26)+"..";
        ttdDynamicSpan.innerText = sign;
        localStorage.setItem('userName', bersih);
    }
    
    function setAvatarFromDataUrl(dataUrl) {
        if(dataUrl && dataUrl !== "") {
            userAvatarImg.src = dataUrl;
            avatarContainer.classList.add('has-image');
            localStorage.setItem('userAvatar', dataUrl);
            currentAvatarDataUrl = dataUrl;
        }
    }
    
    function updateMiniPreview() {
        miniPreviewDiv.innerHTML = '';
        if(currentAvatarDataUrl && currentAvatarDataUrl !== "") {
            const img = document.createElement('img');
            img.src = currentAvatarDataUrl;
            img.style.width = '100%';
            img.style.height = '100%';
            img.style.objectFit = 'cover';
            miniPreviewDiv.appendChild(img);
        } else {
            const svgCopy = document.querySelector('.default-svg').cloneNode(true);
            svgCopy.setAttribute('width', '44');
            svgCopy.setAttribute('height', '44');
            svgCopy.style.width = '44px';
            svgCopy.style.height = '44px';
            miniPreviewDiv.appendChild(svgCopy);
        }
    }
    
    function loadSaved() {
        const savedAvatar = localStorage.getItem('userAvatar');
        if(savedAvatar && savedAvatar !== "") {
            userAvatarImg.src = savedAvatar;
            avatarContainer.classList.add('has-image');
            currentAvatarDataUrl = savedAvatar;
        } else {
            userAvatarImg.src = "assets/hsjs.jpg";
            avatarContainer.classList.add('has-image');
            currentAvatarDataUrl = "assets/hsjs.jpg";
            localStorage.setItem('userAvatar', "assets/hsjs.jpg");
        }
        
        let savedName = localStorage.getItem('userName');
        // Jika nama tidak ada atau masih "Ardan Pratama", paksa jadi YudaSense
        if (!savedName || savedName.trim() === "" || savedName === "Ardan Pratama") {
            updateNamaDanTtd("YudaSense");
        } else {
            namaUserSpan.innerText = savedName;
            let first = savedName.split(' ')[0].toLowerCase();
            let last = savedName.split(' ').slice(1).join('').toLowerCase() || "sense";
            ttdDynamicSpan.innerText = `_${first}.${last}`;
        }
    }
    
    function openPasswordModal() { playClick(); passwordInput.value = ''; passwordError.innerText = ''; passwordModal.classList.add('active'); }
    function closePasswordModal() { passwordModal.classList.remove('active'); }
    function openProfileModal() { modalNamaInput.value = namaUserSpan.innerText; updateMiniPreview(); profileModal.classList.add('active'); tempSelectedFile = null; }
    function closeProfileModal() { profileModal.classList.remove('active'); }
    
    passwordSubmitBtn.addEventListener('click', () => {
        playSoft();
        if(passwordInput.value === CORRECT_PASSWORD) {
            closePasswordModal();
            openProfileModal();
            playSuccess();
        } else {
            passwordError.innerText = "❌ Sandi salah! Coba lagi.";
            playClick();
        }
    });
    passwordCancelBtn.addEventListener('click', () => { playSoft(); closePasswordModal(); });
    passwordModal.addEventListener('click', (e) => { if(e.target === passwordModal) closePasswordModal(); });
    
    modalUploadBtn.addEventListener('click', () => { playSoft(); fileInput.click(); });
    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if(file && file.type.startsWith('image/')) {
            const reader = new FileReader();
            reader.onload = (ev) => {
                tempSelectedFile = ev.target.result;
                currentAvatarDataUrl = tempSelectedFile;
                updateMiniPreview();
                showMessage("Foto siap, klik Simpan", 1200);
                playSuccess();
            };
            reader.readAsDataURL(file);
        } else if(file) { showMessage("Pilih file gambar", 1200); }
        fileInput.value = "";
    });
    
    modalSaveBtn.addEventListener('click', () => {
        playSoft();
        const newNama = modalNamaInput.value.trim();
        if(newNama === "") { showMessage("Nama tidak boleh kosong", 1000); return; }
        updateNamaDanTtd(newNama);
        if(tempSelectedFile) setAvatarFromDataUrl(tempSelectedFile);
        else if(currentAvatarDataUrl && currentAvatarDataUrl !== localStorage.getItem('userAvatar')) setAvatarFromDataUrl(currentAvatarDataUrl);
        showMessage("✨ Profil berhasil diperbarui! ✨", 1500);
        playSuccess();
        tempSelectedFile = null;
        closeProfileModal();
    });
    modalCancelBtn.addEventListener('click', () => { playSoft(); closeProfileModal(); });
    profileModal.addEventListener('click', (e) => { if(e.target === profileModal) closeProfileModal(); });
    
    avatarZone.addEventListener('click', () => { openPasswordModal(); });
    
    document.querySelectorAll('.social-icon-hand').forEach(icon => {
        icon.addEventListener('click', (e) => {
            e.preventDefault();
            playSoft();
            let nm = namaUserSpan.innerText;
            let s = icon.getAttribute('data-social');
            let url = '';
            if(s === 'instagram') url = `https://instagram.com/yudasense`;
            else if(s === 'tiktok') url = `https://tiktok.com/@yudadevvvs`;
            else if(s === 'discord') url = `https://discord.com/users/1223858716567404615`;
            else if(s === 'saweria') url = `https://saweria.co/${nm.split(' ')[0].toLowerCase()}`;
            if(url) window.open(url, '_blank');
        });
    });
    
    function tambahkanDoodleDot() {
        const container = document.querySelector('.sketch-id');
        if(!container) return;
        document.querySelectorAll('.doodle-dot').forEach(d => d.remove());
        for(let i=0;i<18;i++) {
            const dot = document.createElement('div');
            dot.classList.add('doodle-dot');
            const size = Math.random() * 4 + 1.5;
            dot.style.width = size + 'px';
            dot.style.height = size + 'px';
            dot.style.left = Math.random() * 96 + '%';
            dot.style.top = Math.random() * 96 + '%';
            dot.style.opacity = Math.random() * 0.4 + 0.1;
            dot.style.backgroundColor = '#c7a26e';
            container.appendChild(dot);
        }
        const oldSvg = container.querySelector('.random-scribble-svg');
        if(oldSvg) oldSvg.remove();
        const svgContainer = document.createElementNS("http://www.w3.org/2000/svg", "svg");
        svgContainer.classList.add('random-scribble-svg');
        svgContainer.setAttribute("style", "position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:1; opacity:0.18");
        for(let i=0;i<3;i++) {
            let path = document.createElementNS("http://www.w3.org/2000/svg", "path");
            let startX = 20 + Math.random() * 180;
            let startY = 15 + Math.random() * 280;
            path.setAttribute("d", `M ${startX} ${startY} Q ${startX+35} ${startY+18} ${startX+55} ${startY-10}`);
            path.setAttribute("stroke", "#ac8864");
            path.setAttribute("fill", "none");
            path.setAttribute("stroke-width", "1");
            path.setAttribute("stroke-dasharray", "2 3");
            svgContainer.appendChild(path);
        }
        container.appendChild(svgContainer);
    }
    
    document.getElementById('tahunSekarang').innerText = new Date().getFullYear();
    loadSaved();
    tambahkanDoodleDot();
    window.addEventListener('resize', () => tambahkanDoodleDot());
    document.body.addEventListener('click', function initFirst(e) {
        if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
        document.body.removeEventListener('click', initFirst);
    }, { once: true });
</script>
</body>
</html>
